name: Deploy Project to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo bash <<'EOF'
            set -e
            
            # Navigate to the CORRECT project directory
            cd /home/ubuntu/RaddiGo-MonoRepo-FYP-GCS-Lahore
            
            # 1. Temporarily use the secure GitHub Action context token to authenticate
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
            
            # 2. Fetch and pull the code (this bypasses the password prompt)
            git fetch --all --prune
            git reset --hard origin/main
            
            # 3. Clean up the URL so the token isn't left lying around on your server
            git remote set-url origin https://github.com/${{ github.repository }}.git
            
            # 4. Deploy using the single compose file
            docker compose -f docker-compose.yml up -d --build --remove-orphans
            EOF
