# ============================================================
#  RaddiGo — Nginx API Gateway
#  Security-hardened with per-route rate limiting
# ============================================================

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ── Upstream Definitions ─────────────────────────────────
    upstream auth-service {
        server auth-service:3002 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream category-service {
        server category-service:3003 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream order-service {
        server order-service:3004 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream admin-service {
        server admin-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    # ── Docker internal DNS (lazy upstream resolution) ───────
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── WebSocket upgrade map ────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Rate Limit Zones ─────────────────────────────────────
    # Auth endpoints: very strict — 5 req/s, allow short burst for page load
    limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=5r/s;
    # Admin endpoints: moderate — 10 req/s
    limit_req_zone $binary_remote_addr zone=admin_limit:10m   rate=10r/s;
    # General API: relaxed — 30 req/s
    limit_req_zone $binary_remote_addr zone=api_limit:20m     rate=30r/s;
    # Login endpoint: very tight — 3 req/min (brute-force protection)
    limit_req_zone $binary_remote_addr zone=login_limit:10m   rate=3r/m;

    # Return 429 instead of nginx default 503 on rate limit hit
    limit_req_status 429;
    limit_conn_status 429;

    # ── Request Size Limits ──────────────────────────────────
    client_max_body_size 10m;
    client_body_timeout  15s;
    client_header_timeout 10s;

    # ── Hide nginx version ────────────────────────────────────
    server_tokens off;

    # ── Keepalive tuning ─────────────────────────────────────
    keepalive_timeout 65s;
    keepalive_requests 1000;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/json
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        text/xml;

    # ── Proxy shared defaults ─────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Connection "";          # enable upstream keepalive
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ── Log format with rate-limit info ──────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time';
    access_log /var/log/nginx/access.log main;

    # ============================================================
    server {
        listen 80;
        server_name localhost;

        # ── Global Security Headers ───────────────────────────
        add_header X-Frame-Options              "DENY"                        always;
        add_header X-Content-Type-Options       "nosniff"                     always;
        add_header X-XSS-Protection             "1; mode=block"               always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy           "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy
            "default-src 'none'; connect-src 'self'; frame-ancestors 'none';" always;
        # Uncomment when HTTPS is live:
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

        # Block common exploit paths
        location ~* \.(php|asp|aspx|jsp|cgi|sh|bash|env)$ {
            return 444;
        }

        # Block hidden files/directories (e.g., .git, .env)
        location ~ /\. {
            return 444;
        }

        # ── Health check (no rate limit, no logging) ──────────
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── AUTH SERVICE ──────────────────────────────────────

        # Login: ultra-strict rate limit (3/min per IP — brute-force protection)
        location = /auth/api/v1/admin-login {
            limit_req zone=login_limit burst=2 nodelay;
            set $auth_backend http://auth-service:3002;
            proxy_pass $auth_backend;
        }

        location = /auth/api/v1/login {
            limit_req zone=login_limit burst=2 nodelay;
            set $auth_backend http://auth-service:3002;
            proxy_pass $auth_backend;
        }

        location = /auth/api/v1/register {
            limit_req zone=login_limit burst=5 nodelay;
            set $auth_backend http://auth-service:3002;
            proxy_pass $auth_backend;
        }

        # All other auth routes: 5 req/s
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            set $auth_backend http://auth-service:3002;
            proxy_pass $auth_backend;
        }

        location = /auth/health {
            access_log off;
            proxy_pass http://auth-service/health;
        }

        # ── WALLET SERVICE (hosted inside auth-service) ───────
        location /wallet/ {
            limit_req zone=auth_limit burst=15 nodelay;
            proxy_pass http://auth-service;
        }

        location = /wallet/health {
            access_log off;
            proxy_pass http://auth-service/health;
        }

        # ── CATEGORY SERVICE ──────────────────────────────────
        location /category/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://category-service;
        }

        location = /category/health {
            access_log off;
            proxy_pass http://category-service/health;
        }

        # ── ORDER SERVICE ─────────────────────────────────────
        location /order/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://order-service;
        }

        location = /order/health {
            access_log off;
            proxy_pass http://order-service/health;
        }

        # WebSocket — no rate limit (long-lived connection), no buffering
        location /order/ws {
            proxy_pass http://order-service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Bun emits duplicate Content-Length headers (mixed-case) — suppress both
            proxy_hide_header Content-Length;
            proxy_hide_header content-length;
            proxy_read_timeout 86400s;
            proxy_buffering    off;
        }

        # ── ADMIN SERVICE ─────────────────────────────────────
        location /admin/ {
            limit_req zone=admin_limit burst=20 nodelay;
            proxy_pass http://admin-service/;
        }

        location = /admin/health {
            access_log off;
            proxy_pass http://admin-service/health;
        }

        # ── Catch-all: reject everything else ─────────────────
        location / {
            return 404 "Not found\n";
            add_header Content-Type text/plain;
        }
    }
}
