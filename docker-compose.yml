services:
  nginx:
    image: nginx:stable-alpine
    container_name: raddigo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - raddigo-network
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      category-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: ./apps/auth-service/Dockerfile
      target: development
    container_name: raddigo-auth-dev
    ports:
      - "3002:3002"
    volumes:
      - ./apps/auth-service:/app/apps/auth-service
      - ./packages:/app/packages
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - AUTH_PORT=3002
      - AUTH_HOST=auth-service
      - DB_HOST=mysql
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL_MODE=${DB_SSL_MODE}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - NODEMAILER_PASS=${NODEMAILER_PASS}
      - NODEMAILER_USER=${NODEMAILER_USER}
      - NODEMAILER_HOST=${NODEMAILER_HOST}
      - NODEMAILER_PORT=${NODEMAILER_PORT}
    env_file:
      - .env
    networks:
      - raddigo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Category Service
  category-service:
    build:
      context: .
      dockerfile: ./apps/category-service/Dockerfile
      target: development
    container_name: raddigo-category-dev
    ports:
      - "3003:3003"
    volumes:
      - ./apps/category-service:/app/apps/category-service
      - ./packages:/app/packages
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CATEGORY_PORT=3003
      - DB_HOST=mysql
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL_MODE=${DB_SSL_MODE}
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    networks:
      - raddigo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: ./apps/order-service/Dockerfile
      target: development
    container_name: raddigo-order-dev
    ports:
      - "3004:3004"
    volumes:
      - ./apps/order-service:/app/apps/order-service
      - ./packages:/app/packages
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - ORDER_PORT=3004
      - DB_HOST=mysql
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL_MODE=${DB_SSL_MODE}
      - REDIS_URL=redis://redis:6379
      - RADIUS_KM=${RADIUS_KM}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
    env_file:
      - .env
    networks:
      - raddigo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3004/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin Service
  admin-service:
    build:
      context: .
      dockerfile: ./apps/admin-service/Dockerfile
      target: development
    container_name: raddigo-admin-dev
    ports:
      - "8000:8000"
    volumes:
      - ./apps/admin-service:/app/apps/admin-service
      - ./packages:/app/packages
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - ADMIN_PORT=8000
      - DB_HOST=mysql
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL_MODE=${DB_SSL_MODE}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    env_file:
      - .env
    networks:
      - raddigo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: raddigo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - raddigo-network

  # Redis (in-memory cache)
  redis:
    image: redis:7-alpine
    container_name: raddigo-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - raddigo-network

networks:
  raddigo-network:
    driver: bridge
    name: raddigo-dev-network

volumes:
  node_modules:
  mysql_data:
  redis_data:
