services:
  # Gateway Service - Production
  gateway:
    build:
      context: .
      dockerfile: ./apps/gateway/Dockerfile
      target: production
    container_name: raddigo-gateway-prod
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - GATEWAY_PORT=3001
      - AUTH_PORT=3002
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CATEGORY_PORT=3003
      - ORDER_PORT=3004
    env_file:
      - .env.production
    depends_on:
      auth-service:
        condition: service_healthy
      category-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - raddigo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Auth Service - Production
  auth-service:
    build:
      context: .
      dockerfile: ./apps/auth-service/Dockerfile
      target: production
    container_name: raddigo-auth-prod
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - AUTH_PORT=3002
    env_file:
      - .env.production
    networks:
      - raddigo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3002').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Category Service - Production
  category-service:
    build:
      context: .
      dockerfile: ./apps/category-service/Dockerfile
      target: production
    container_name: raddigo-category-prod
    expose:
      - "3003"
    environment:
      - NODE_ENV=production
      - CATEGORY_PORT=3003
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    env_file:
      - .env.production
    networks:
      - raddigo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3003').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Order Service - Production
  order-service:
    build:
      context: .
      dockerfile: ./apps/order-service/Dockerfile
      target: production
    container_name: raddigo-order-prod
    expose:
      - "3004"
    environment:
      - NODE_ENV=production
      - ORDER_PORT=3004
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    env_file:
      - .env.production
    networks:
      - raddigo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.7'
        reservations:
          memory: 256M
          cpus: '0.35'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3004').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
  
  # Redis (in-memory cache)
  redis:
    image: redis:7-alpine
    container_name: raddigo-redis-prod
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - raddigo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Nginx Load Balancer (Optional - for production scaling)
  nginx:
    image: nginx:alpine
    container_name: raddigo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
    networks:
      - raddigo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

networks:
  raddigo-network:
    driver: bridge
    name: raddigo-prod-network

volumes:
  redis_data:
